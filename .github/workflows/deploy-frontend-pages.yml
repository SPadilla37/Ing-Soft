name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - Develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Debug workspace
        run: |
          pwd
          node --version
          npm --version
          ls -la
          ls -la Frontend

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: Frontend
        env:
          VITE_API_BASE: https://ing-soft-5shh.onrender.com
        run: npm run build

      - name: Add root redirect pages
        run: |
          cat > Frontend/dist/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=/Ing-Soft/Frontend/" />
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="/Ing-Soft/Frontend/">/Ing-Soft/Frontend/</a>...</p>
          </body>
          </html>
          EOF
          cp Frontend/dist/index.html Frontend/dist/404.html

      - name: Debug build output
        run: ls -la Frontend/dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
